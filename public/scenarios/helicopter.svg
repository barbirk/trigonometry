<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#0F1117"/>
  <!-- Ground -->
  <path d="M0 250 Q200 230 400 250 L400 300 L0 300 Z" fill="#1C1F2E"/>
  <!-- Mountains -->
  <path d="M0 250 L80 180 L160 250 L240 200 L320 250 L400 220 L400 250 Z" fill="#2A2D3E"/>
  <!-- Helicopter body -->
  <ellipse cx="200" cy="100" rx="50" ry="25" fill="#4DFFA4" opacity="0.3"/>
  <ellipse cx="200" cy="100" rx="40" ry="20" fill="#4DFFA4"/>
  <!-- Tail -->
  <path d="M160 100 L100 90 L100 110 Z" fill="#4DFFA4"/>
  <!-- Main rotor -->
  <line x1="150" y1="80" x2="250" y2="80" stroke="#F0F4FF" stroke-width="3"/>
  <line x1="200" y1="75" x2="200" y2="80" stroke="#F0F4FF" stroke-width="2"/>
  <!-- Tail rotor -->
  <circle cx="95" cy="100" r="12" fill="none" stroke="#F0F4FF" stroke-width="2"/>
  <!-- Height indicator -->
  <line x1="280" y1="100" x2="280" y2="250" stroke="#FFD166" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="290" y="175" fill="#FFD166" font-family="Space Mono" font-size="12">800m</text>
  <!-- Person on ground -->
  <circle cx="200" cy="245" r="5" fill="#FF6B6B"/>
  <line x1="200" y1="250" x2="200" y2="265" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="190" y1="255" x2="210" y2="255" stroke="#FF6B6B" stroke-width="2"/>
  <!-- Angle indicator -->
  <path d="M200 100 L200 130 Q200 140 190 145" fill="none" stroke="#FFD166" stroke-width="2"/>
  <text x="215" y="140" fill="#FFD166" font-family="Space Mono" font-size="12">32°</text>
  <text x="200" y="285" text-anchor="middle" fill="#F0F4FF" font-family="Space Mono" font-size="14">Rescue Scenario</text>
</svg>
