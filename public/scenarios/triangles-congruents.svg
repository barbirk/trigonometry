<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <!-- Triangle ABC -->
  <polygon points="20,100 80,100 20,30" fill="none" stroke="#4DFFA4" stroke-width="2"/>
  <text x="15" y="115" fill="#F0F4FF" font-size="10" font-family="JetBrains Mono">A</text>
  <text x="85" y="115" fill="#F0F4FF" font-size="10" font-family="JetBrains Mono">B</text>
  <text x="10" y="25" fill="#F0F4FF" font-size="10" font-family="JetBrains Mono">C</text>
  
  <!-- Congruent symbol -->
  <text x="100" y="65" fill="#FFD166" font-size="16" font-family="JetBrains Mono">≅</text>
  
  <!-- Triangle DEF -->
  <polygon points="120,100 180,100 120,30" fill="none" stroke="#4DFFA4" stroke-width="2"/>
  <text x="115" y="115" fill="#F0F4FF" font-size="10" font-family="JetBrains Mono">D</text>
  <text x="185" y="115" fill="#F0F4FF" font-size="10" font-family="JetBrains Mono">E</text>
  <text x="110" y="25" fill="#F0F4FF" font-size="10" font-family="JetBrains Mono">F</text>
  
  <!-- Tick marks -->
  <line x1="35" y1="105" x2="35" y2="95" stroke="#4DFFA4" stroke-width="2"/>
  <line x1="135" y1="105" x2="135" y2="95" stroke="#4DFFA4" stroke-width="2"/>
</svg>
